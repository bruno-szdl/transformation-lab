name: Notify search engines

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        run: sleep 120

      - name: Fetch sitemap URLs
        id: sitemap
        run: |
          xml=$(curl -sf https://transform-lab.datagym.io/sitemap.xml)
          urls=$(echo "$xml" | grep -oP '(?<=<loc>)[^<]+' | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "urls=$urls" >> "$GITHUB_OUTPUT"

      - name: Submit to IndexNow
        run: |
          payload=$(jq -n \
            --arg host "transform-lab.datagym.io" \
            --arg key "4e8f0331830f40e294212b22425e529d" \
            --arg keyLocation "https://transform-lab.datagym.io/4e8f0331830f40e294212b22425e529d.txt" \
            --argjson urlList '${{ steps.sitemap.outputs.urls }}' \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
          curl -f -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload"
