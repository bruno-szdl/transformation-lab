<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background: dark gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081522;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132c42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent stripe on left -->
  <rect width="8" height="630" fill="#ff694a"/>

  <!-- Logo/Title area -->
  <g>
    <!-- "Analytics Engineering" in orange (smaller) -->
    <text x="80" y="150" font-family="Inter, sans-serif" font-size="56" font-weight="600" fill="#ff694a" letter-spacing="-1">Analytics Engineering</text>

    <!-- "Quest" in white (large) -->
    <text x="80" y="260" font-family="Inter, sans-serif" font-size="120" font-weight="700" fill="#d4e1ec" letter-spacing="-2">Quest</text>

    <!-- Tagline -->
    <text x="80" y="320" font-family="Inter, sans-serif" font-size="32" font-weight="400" fill="#9fb2c3">Learn dbt interactively</text>

    <!-- Description -->
    <text x="80" y="370" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#748699">14 hands-on lessons • No setup required • Learn in your browser</text>

    <!-- Feature icons + text -->
    <g>
      <!-- Icon 1: Code -->
      <rect x="80" y="410" width="280" height="140" rx="8" fill="#0e2336" stroke="#1f3a52" stroke-width="2"/>
      <text x="110" y="455" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#ff694a">💻 Code in Browser</text>
      <text x="110" y="485" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">Monaco Editor + DuckDB</text>
      <text x="110" y="520" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">No installation needed</text>

      <!-- Icon 2: Build DAG -->
      <rect x="420" y="410" width="280" height="140" rx="8" fill="#0e2336" stroke="#1f3a52" stroke-width="2"/>
      <text x="450" y="455" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#ff694a">🔗 See Your DAG</text>
      <text x="450" y="485" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">Visual lineage graph</text>
      <text x="450" y="520" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">Understand dependencies</text>

      <!-- Icon 3: Complete Course -->
      <rect x="760" y="410" width="280" height="140" rx="8" fill="#0e2336" stroke="#1f3a52" stroke-width="2"/>
      <text x="790" y="455" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#ff694a">🎯 Learn Core dbt</text>
      <text x="790" y="485" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">Models, refs, tests, docs</text>
      <text x="790" y="520" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#748699">Production-ready patterns</text>
    </g>

    <!-- URL -->
    <text x="1120" y="610" font-family="JetBrains Mono, monospace" font-size="18" font-weight="400" fill="#748699" text-anchor="end">transform-lab.datagym.io</text>
  </g>
</svg>
